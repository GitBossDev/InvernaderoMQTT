# Configuración básica de Mosquitto
# Fase 1: Sin autenticación para facilitar el aprendizaje inicial

# Permitir conexiones anónimas (sin usuario/contraseña)
# En Fase 6 se configurará autenticación
allow_anonymous true

# Puerto por defecto de MQTT
listener 1883

# Puerto para WebSockets (útil para dashboard web)
listener 9001
protocol websockets

# Logging para debugging
log_dest stdout
log_type all

# Persistencia de mensajes
persistence true
persistence_location /mosquitto/data/

# Archivo de log
log_dest file /mosquitto/log/mosquitto.log
